<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Seller Dashboard — CyberMart</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
body{display:flex;flex-direction:column;}
.sidebar-avatar-seller { width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent2),#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.35rem;font-weight:800;color:#000;margin-bottom:0.5rem; }
</style>
</head>
<body>
<div id="navbar-placeholder"></div>
<div class="dash-layout">
  <div class="sidebar">
    <div class="sidebar-avatar-seller">S</div>
    <div class="sidebar-name" id="sidebar-name">Seller</div>
    <div class="sidebar-role"><span class="badge badge-seller">SELLER</span></div>
    <div class="sidebar-menu">
      <button class="menu-item active" onclick="showTab('overview',this)">📊 Overview</button>
      <button class="menu-item" onclick="showTab('listings',this)">📦 My Listings</button>
      <button class="menu-item" onclick="showTab('add-product',this)">➕ Add Product</button>
      <div class="divider"></div>
      <button class="menu-item" onclick="logout()">🚪 Logout</button>
    </div>
  </div>
  <div class="dash-content fade-in">

    <!-- OVERVIEW -->
    <div id="tab-overview">
      <div class="section-title">Seller Dashboard</div>
      <div class="alert alert-success">✅ Your account is verified. You can list products and services.</div>
      <div class="stats-row">
        <div class="stat-card green"><div class="stat-val" id="stat-listings">—</div><div class="stat-label">Active Listings</div></div>
        <div class="stat-card warn"><div class="stat-val" id="stat-pending">—</div><div class="stat-label">Pending Approval</div></div>
      </div>
    </div>

    <!-- LISTINGS -->
    <div id="tab-listings" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
        <div class="section-title" style="margin:0">My Listings</div>
        <button class="btn btn-primary btn-sm" onclick="showTab('add-product', null)">+ Add Product</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Product</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="listings-body">
          <tr><td colspan="6" style="text-align:center;color:var(--muted)">Loading...</td></tr>
        </tbody>
      </table></div>
    </div>

    <!-- ADD PRODUCT -->
    <div id="tab-add-product" style="display:none">
      <div class="section-title">Add New Product</div>
      <div id="add-error" style="display:none" class="alert alert-warn"></div>
      <div id="add-success" style="display:none" class="alert alert-success"></div>
      <div class="form-group">
        <label class="form-label">Product Name</label>
        <input type="text" class="form-input" id="p-name" placeholder="e.g. USB Security Key"/>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" class="form-input" id="p-desc" placeholder="Short description"/>
      </div>
      <div class="form-group">
        <label class="form-label">Price ($)</label>
        <input type="number" class="form-input" id="p-price" placeholder="e.g. 49.99"/>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-input" id="p-category">
          <option value="network">Network Testing</option>
          <option value="auth">Auth Devices</option>
          <option value="storage">Storage</option>
          <option value="tools">Tools</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Stock</label>
        <input type="number" class="form-input" id="p-stock" placeholder="e.g. 100"/>
      </div>
      <div class="form-group">
        <label class="form-label">Icon (emoji)</label>
        <input type="text" class="form-input" id="p-icon" placeholder="e.g. 🔑"/>
      </div>
      <button class="btn btn-primary form-btn" onclick="addProduct()">Submit for Approval</button>
    </div>

  </div>
</div>
<script src="../js/api.js"></script>
<script src="../js/ai-chat.js"></script>
<script>
requireAuth(['seller']);
renderNavbar();
document.getElementById('sidebar-name').textContent = getName() || 'Seller';

function showTab(tab, btn) {
  document.querySelectorAll('[id^="tab-"]').forEach(el => el.style.display = 'none');
  document.getElementById('tab-' + tab).style.display = 'block';
  document.querySelectorAll('.menu-item').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (tab === 'listings') loadListings();
}

function statusTag(approved) {
  return approved
    ? '<span class="tag tag-green">Active</span>'
    : '<span class="tag tag-warn">Pending</span>';
}

async function loadListings() {
  const data = await apiGet('/seller/products');

  if (!Array.isArray(data)) {
    document.getElementById('listings-body').innerHTML =
      '<tr><td colspan="6" style="text-align:center;color:var(--muted)">Failed to load listings.</td></tr>';
    return;
  }

  // Update stats
  const active = data.filter(p => p.is_approved).length;
  const pending = data.filter(p => !p.is_approved).length;
  document.getElementById('stat-listings').textContent = active;
  document.getElementById('stat-pending').textContent = pending;

  if (data.length === 0) {
    document.getElementById('listings-body').innerHTML =
      '<tr><td colspan="6" style="text-align:center;color:var(--muted)">No products yet. Add your first product!</td></tr>';
    return;
  }

  document.getElementById('listings-body').innerHTML = data.map(p => `
    <tr>
      <td>${p.icon || '🔒'} ${p.name}</td>
      <td>${p.category}</td>
      <td style="color:var(--accent);font-family:var(--font-mono)">$${parseFloat(p.price).toFixed(2)}</td>
      <td>${p.stock}</td>
      <td>${statusTag(p.is_approved)}</td>
      <td>
        <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">Delete</button>
      </td>
    </tr>`).join('');
}

async function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  const data = await apiDelete('/products/' + id);
  if (data.error) {
    alert('⚠ ' + data.error);
  } else {
    loadListings();
  }
}

async function addProduct() {
  const name        = document.getElementById('p-name').value.trim();
  const description = document.getElementById('p-desc').value.trim();
  const price       = document.getElementById('p-price').value;
  const category    = document.getElementById('p-category').value;
  const stock       = document.getElementById('p-stock').value;
  const icon        = document.getElementById('p-icon').value.trim();
  const errEl       = document.getElementById('add-error');
  const okEl        = document.getElementById('add-success');

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (!name || !price || !category) {
    errEl.textContent = '⚠ Name, price and category are required.';
    errEl.style.display = 'flex'; return;
  }

  const data = await apiPost('/products', { name, description, price: parseFloat(price), category, stock: parseInt(stock) || 0, icon });

  if (data.error) {
    errEl.textContent = '⚠ ' + data.error;
    errEl.style.display = 'flex';
    return;
  }

  okEl.textContent = '✅ Product submitted and awaiting admin approval!';
  okEl.style.display = 'flex';
  document.getElementById('p-name').value = '';
  document.getElementById('p-desc').value = '';
  document.getElementById('p-price').value = '';
  document.getElementById('p-stock').value = '';
  document.getElementById('p-icon').value = '';
}

// Load stats on page load
async function loadStats() {
  const data = await apiGet('/seller/products');
  if (!Array.isArray(data)) return;
  document.getElementById('stat-listings').textContent = data.filter(p => p.is_approved).length;
  document.getElementById('stat-pending').textContent = data.filter(p => !p.is_approved).length;
}

loadStats();
</script>
</body>
</html>
