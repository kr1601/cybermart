<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — CyberMart</title>
<link rel="stylesheet" href="../css/style.css"/>
<style>
body { display: flex; flex-direction: column; }
main { flex: 1; display: flex; }
</style>
</head>
<body>
<div id="navbar-placeholder"></div>
<main>
  <div class="auth-wrap">
    <div class="auth-box fade-in">
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your CyberMart account</div>

      <div id="error-msg" style="display:none" class="alert alert-warn"></div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" id="email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="password" placeholder="••••••••"/>
      </div>

      <button class="btn btn-primary form-btn" onclick="doLogin()">Sign In</button>

      <div class="form-hint" style="margin-top:1rem">
        Demo:
        <a onclick="quickLogin('buyer')">Buyer</a> ·
        <a onclick="quickLogin('seller')">Seller</a> ·
        <a onclick="quickLogin('admin')">Admin</a>
      </div>
      <div class="form-hint">No account? <a href="register.html">Register here</a></div>
    </div>
  </div>
</main>

<script src="../js/api.js"></script>
<script src="../js/ai-chat.js"></script>
<script>
renderNavbar();

// If already logged in, redirect to dashboard
if (isLoggedIn()) redirectByRole(getRole());

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('error-msg');
  errEl.style.display = 'none';

  if (!email || !password) {
    errEl.textContent = '⚠ Please enter your email and password.';
    errEl.style.display = 'flex'; return;
  }

  // TODO: replace with real API call
  // const data = await apiPost('/auth/login.php', { email, password });
  // if (data.error) { errEl.textContent = data.error; errEl.style.display='flex'; return; }
  // if (data.require_mfa) { localStorage.setItem('cm_pending_role', data.role); window.location.href='mfa.html'; return; }
  // setSession(data.token, data.role, data.name);
  // redirectByRole(data.role);

  errEl.textContent = '⚠ Invalid credentials. Use the Demo links below.';
  errEl.style.display = 'flex';
}

function quickLogin(role) {
  if (role === 'seller' || role === 'admin') {
    localStorage.setItem('cm_pending_role', role);
    window.location.href = 'mfa.html';
  } else {
    setSession('demo-token-buyer', 'buyer', 'Alex Buyer');
    redirectByRole('buyer');
  }
}
</script>
</body>
</html>
