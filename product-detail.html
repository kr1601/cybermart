<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Product — CyberMart</title>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="logo">Cyber<span>Mart</span></a>
  <div class="nav-links">
    <a href="index.html" class="nav-btn">Home</a>
    <a href="products.html" class="nav-btn active">Products</a>
    <a href="services.html" class="nav-btn">Services</a>
  </div>
  <div class="nav-right">
    <a href="login.html" class="nav-btn">Login</a>
    <a href="register.html" class="btn btn-primary btn-sm">Register</a>
  </div>
</nav>
<div class="container" id="detail-root">
  <div style="text-align:center;padding:3rem;color:var(--muted)">Loading product...</div>
</div>
<footer>
  <span>© 2025 CyberMart — Group 10</span>
  <span class="tag tag-green">🔒 SSL Secured</span>
</footer>
<script src="js/env-config.js"></script>
<script src="js/api.js"></script>
<script src="js/cybermart-assistant.js"></script>
<script>
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

async function renderDetail() {
  const root    = document.getElementById('detail-root');
  const idParam = new URLSearchParams(window.location.search).get('id');

  if (!idParam) {
    showNotFound(root);
    return;
  }

  const p = await apiGet('/products/' + idParam);

  if (p.error || !p.id) {
    showNotFound(root);
    return;
  }

  let features = p.features || [];
  if (typeof features === 'string') {
    try { features = JSON.parse(features); } catch { features = []; }
  }
  if (!Array.isArray(features)) features = [];

  const priceNum = parseFloat(p.price);
  const priceDisp = Number.isFinite(priceNum) ? '$' + priceNum.toFixed(2) : String(p.price || '');

  renderProduct(root, {
    id: p.id,
    name: p.name,
    price: priceDisp,
    image_url: p.image_url || '',
    icon: p.icon || '🔒',
    category: p.category || p.cat || '',
    seller_name: p.seller_name || p.seller || p.seller_id || 'Unknown',
    tag: p.tag || '',
    description: p.description || '',
    features
  });
}

function renderProduct(root, p) {
  document.title = p.name + ' — CyberMart';

  const tagHtml = p.tag
    ? '<span class="tag tag-green">' + escapeHtml(p.tag) + '</span>'
    : '';

  const featuresHtml = (p.features || []).map(f =>
    '<li>' + escapeHtml(f) + '</li>'
  ).join('');

  const mediaHtml = p.image_url
    ? '<img src="' + escapeHtml(p.image_url) + '" alt="' + escapeHtml(p.name || 'Product') + '" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.replaceWith(document.createTextNode(' + JSON.stringify(p.icon || '🔒') + '))" />'
    : escapeHtml(p.icon || '🔒');

  root.innerHTML =
    '<nav class="product-detail-breadcrumb" aria-label="Breadcrumb">' +
    '<a href="products.html">Products</a> <span aria-hidden="true"> / </span> ' + escapeHtml(p.name) +
    '</nav>' +
    '<div class="product-detail-grid">' +
    '  <div class="product-detail-visual" aria-hidden="true">' + mediaHtml + '</div>' +
    '  <div class="product-detail-main">' +
    '    <h1>' + escapeHtml(p.name) + '</h1>' +
    '    <div class="product-detail-meta-row">' +
    tagHtml +
    '      <span class="card-meta">Sold by <strong style="color:var(--text)">' + escapeHtml(p.seller_name) + '</strong></span>' +
    '    </div>' +
    '    <div class="product-detail-price">' + escapeHtml(p.price) + '</div>' +
    '    <p class="product-detail-desc">' + escapeHtml(p.description) + '</p>' +
    (featuresHtml ? '<div class="product-detail-features-title">Key features</div><ul class="product-detail-features">' + featuresHtml + '</ul>' : '') +
    '    <div class="product-detail-actions">' +
    '      <button type="button" class="btn btn-primary" onclick="addToCart(' + p.id + ',' + JSON.stringify(p.name) + ')">Add to Cart</button>' +
    '      <a href="products.html" class="btn btn-outline">Continue shopping</a>' +
    '    </div>' +
    '  </div>' +
    '</div>';
}

function showNotFound(root) {
  document.title = 'Product not found — CyberMart';
  root.innerHTML =
    '<div class="product-not-found">' +
    '<div class="section-title" style="justify-content:center">Product not found</div>' +
    '<p>We couldn\'t find a product for this link. It may have been removed or the ID is invalid.</p>' +
    '<a href="products.html" class="btn btn-primary">Back to Products</a>' +
    '</div>';
}

renderDetail();
</script>
</body>
</html>
